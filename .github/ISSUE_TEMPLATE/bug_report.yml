name: Bug report
description: Report a defect with steps and expected behavior
title: "bug: "
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for deterministic reproduction.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps, inputs, and environment
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traces / screenshots
      render: shell
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This is not a sensitive vulnerability disclosure
          required: true

