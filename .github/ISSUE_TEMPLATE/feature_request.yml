name: Feature request
description: Propose a feature or roadmap item
title: "feat: "
labels: ["kind/feature"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the request
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or engineering problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe APIs, behavior, and affected components
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Measurable done conditions
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Which docs must be updated?

