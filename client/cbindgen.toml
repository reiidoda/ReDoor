language = "C"
include_version = true
header = """
// Generated by cbindgen. Do not edit by hand.
// ReDoor FFI surface for native hosts (iOS).
"""
include_guard = "REDOOR_CLIENT_H"
cpp_compat = true

[parse]
parse_deps = false
clean = true

[export]
item_types = ["functions", "typedefs"]
include = [
  "redoor_init_runtime",
  "redoor_scripted_loopback",
  "redoor_set_relay_hmac_b64",
  "redoor_scripted_loopback_ext",
  "redoor_set_pq_enabled",
  "redoor_shutdown_runtime",
]

[layout]
enum_class = false
